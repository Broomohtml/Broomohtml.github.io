<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="theme-color" content="#0B0B15" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon-192.png" />
  <title>Finance — Pocket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body data-page="pockets">

<!-- HEADER -->
<header class="app-header">
  <div class="header-avatar" id="headerAvatar" onclick="goTo('profile')">B</div>
  <div class="header-search">
    <span class="material-symbols-outlined">search</span>
    <input type="text" id="pocketsSearch" placeholder="Cerca pocket…"
           oninput="renderPockets()" autocomplete="off" />
  </div>
  <div class="header-actions">
    <button class="header-icon-btn" onclick="goTo('dashboard')" aria-label="Dashboard">
      <span class="material-symbols-outlined">bar_chart</span>
    </button>
    <button class="header-icon-btn" onclick="openPocketModal(null)" aria-label="Aggiungi">
      <span class="material-symbols-outlined">add</span>
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main-content">

  <!-- Hero totale allocato -->
  <section class="page-hero">
    <div class="page-hero-label">Totale allocato</div>
    <div class="page-hero-value" id="pocketsTotalValue">€0</div>
    <div class="page-hero-sub" id="pocketsCount"></div>
  </section>

  <!-- Lista pocket -->
  <div class="page-list-sheet">
    <div class="page-list-scroll">
      <div id="pocketsList"></div>
    </div>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('entrate')">
    <span class="material-symbols-outlined nav-icon">payments</span>
    <span class="nav-label">Entrate</span>
  </button>
  <button class="nav-item" onclick="goTo('home')">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item active" onclick="goTo('pockets')">
    <span class="material-symbols-outlined nav-icon">grid_view</span>
    <span class="nav-label">Pocket</span>
  </button>
</nav>

<!-- POCKET MODAL -->
<div class="modal-overlay" id="pocketModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="pocketModalTitle">Nuovo pocket</span>
      <button class="modal-close-x" onclick="closePocketModal()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="pocket-preview">
      <div class="pocket-preview-icon" id="pocketPreviewIcon">💳</div>
      <div>
        <div class="pocket-preview-name" id="pocketPreviewName">Pocket</div>
        <div class="pocket-preview-amount" id="pocketPreviewAmount">€0 / mese</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" class="form-input emoji-input" id="pocketEmoji" placeholder="💳" maxlength="2" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" class="form-input" id="pocketName" placeholder="es. Affitto" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Importo mensile (€)</label>
      <input type="number" class="form-input" id="pocketAmount" placeholder="400" min="0" step="1" inputmode="numeric" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Descrizione <span class="form-label-hint">(opzionale, max 25 car.)</span></label>
      <input type="text" class="form-input" id="pocketDescription" placeholder="es. Budget mensile" maxlength="25" />
    </div>
    <div class="form-group">
      <label class="form-label">Colore</label>
      <div class="color-swatches" id="pocketColorSwatches"></div>
    </div>
    <button class="submit-btn" onclick="savePocket()">Salva pocket</button>
    <button class="delete-btn" id="pocketDeleteBtn" onclick="deletePocketFromModal()" style="display:none">Elimina pocket</button>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
  document.documentElement.style.setProperty('--screen-height', window.screen.height + 'px');
  function setAppHeight() {
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      setAppHeight();
      setTimeout(setAppHeight, 300);
    });
  } else {
    window.addEventListener('resize', setAppHeight);
  }
</script>
</body>
</html>
