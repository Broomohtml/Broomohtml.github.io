<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="theme-color" content="#0D0D14" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon-192.png" />
  <title>Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body data-page="profile">

<header class="app-header">
  <button class="icon-btn" onclick="openHamburger()">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <span class="app-name">Finance</span>
  <div class="header-avatar" id="headerAvatar">B</div>
</header>

<main class="main-content">
  <!-- Avatar hero -->
  <section class="profile-hero">
    <div class="profile-avatar-ring">
      <div class="profile-avatar-circle" id="profileAvatarCircle">B</div>
    </div>
    <h2 class="profile-hero-name" id="profileHeroName">Profilo</h2>
    <p class="profile-hero-sub">Budget planner</p>
  </section>

  <!-- Fields -->
  <div class="profile-fields">
    <div class="profile-field-card">
      <div class="profile-field-icon" style="background:var(--violet-soft);color:var(--violet-light)">
        <span class="material-symbols-outlined">person</span>
      </div>
      <div class="profile-field-body">
        <label class="profile-field-label">Nome</label>
        <input type="text" class="profile-field-input" id="profileName" placeholder="Il tuo nome" oninput="saveProfile()" autocomplete="name" />
      </div>
    </div>

    <div class="profile-field-card">
      <div class="profile-field-icon" style="background:var(--violet-soft);color:var(--violet-light)">
        <span class="material-symbols-outlined">calendar_today</span>
      </div>
      <div class="profile-field-body">
        <label class="profile-field-label">Data di nascita</label>
        <input type="date" class="profile-field-input settings-date-input" id="profileBirthdate" oninput="saveProfile()" />
      </div>
    </div>

    <div class="profile-field-card">
      <div class="profile-field-icon" style="background:var(--violet-soft);color:var(--violet-light)">
        <span class="material-symbols-outlined">work</span>
      </div>
      <div class="profile-field-body">
        <label class="profile-field-label">Posizione lavorativa</label>
        <input type="text" class="profile-field-input" id="profileJob" placeholder="Es. Sviluppatore" oninput="saveProfile()" autocomplete="organization-title" />
      </div>
    </div>
  </div>

  <!-- Version -->
  <p class="app-version-label">Finance v3.5.1</p>
</main>

<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('entrate')">
    <span class="material-symbols-outlined nav-icon">payments</span>
    <span class="nav-label">Entrate</span>
  </button>
  <button class="nav-item nav-item--center" onclick="goTo('home')">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" onclick="goTo('pockets')">
    <span class="material-symbols-outlined nav-icon">grid_view</span>
    <span class="nav-label">Pocket</span>
  </button>
</nav>

<!-- HAMBURGER MENU -->
<div class="modal-overlay" id="hamburgerMenu">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Menu</span>
      <button class="modal-close-x" onclick="closeHamburger()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="hamburger-items">
      <button class="hamburger-item" onclick="hamburgerGo('profile')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">person</span>
        </div>
        <span class="hamburger-item-label">Profilo</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('dashboard')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">bar_chart</span>
        </div>
        <span class="hamburger-item-label">Dashboard</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('partner')">
        <div class="hamburger-item-icon" style="background:rgba(236,72,153,0.13);color:#EC4899">
          <span class="material-symbols-outlined">group</span>
        </div>
        <span class="hamburger-item-label">Partner</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('settings')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">settings</span>
        </div>
        <span class="hamburger-item-label">Impostazioni</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  }
</script>
</body>
</html>
