<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="theme-color" content="#0D0D14" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon-192.png" />
  <title>Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body data-page="partner">

<header class="app-header">
  <div class="header-left">
    <button class="icon-btn" onclick="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <span class="page-title">Partner</span>
  </div>
  <div class="header-avatar" id="headerAvatar">B</div>
</header>

<main class="main-content">
  <section class="summary-card" style="cursor:default">
    <p class="summary-card-label-sm" style="margin-bottom:12px">Percentuale di contribuzione</p>
    <div class="partner-pct-row">
      <div class="partner-pct-block">
        <p class="partner-pct-name" id="partnerNameA">Tu</p>
        <p class="partner-pct-value" id="partnerPctA">0%</p>
        <p class="partner-pct-amount" id="partnerAmtA">€0</p>
      </div>
      <div class="summary-sep"></div>
      <div class="partner-pct-block">
        <p class="partner-pct-name" id="partnerNameB">Partner</p>
        <p class="partner-pct-value" id="partnerPctB">0%</p>
        <p class="partner-pct-amount" id="partnerAmtB">€0</p>
      </div>
    </div>
    <div class="summary-bar-bg" style="margin-top:14px">
      <div class="summary-bar-fill" id="partnerBarFill" style="width:50%"></div>
    </div>
  </section>

  <div class="settings-block" style="margin-top:20px">
    <p class="settings-group-label">Le tue entrate</p>
    <div class="settings-item" style="cursor:default">
      <div class="settings-item-left">
        <div class="settings-item-icon" style="background:var(--violet-soft);color:var(--violet-light)">
          <span class="material-symbols-outlined">person</span>
        </div>
        <span class="settings-item-name" id="partnerMyName">Tu</span>
      </div>
      <div class="settings-item-right">
        <span class="settings-item-value" id="partnerMyIncome">€0</span>
      </div>
    </div>
  </div>

  <div class="settings-block">
    <p class="settings-group-label">Dati partner</p>
    <div class="settings-item" style="cursor:default">
      <div class="settings-item-left">
        <div class="settings-item-icon" style="background:rgba(236,72,153,0.15);color:#EC4899">
          <span class="material-symbols-outlined">group</span>
        </div>
        <input type="text" class="settings-inline-input" id="partnerNameInputB" placeholder="Nome partner" oninput="renderPartner()" autocomplete="off" />
      </div>
      <div class="settings-item-right">
        <span style="color:var(--text-muted);font-size:13px">€</span>
        <input type="number" class="settings-inline-amount" id="partnerAmtInputB" placeholder="0" min="0" step="1" inputmode="numeric" oninput="renderPartner()" />
      </div>
    </div>
  </div>

  <div class="partner-example" id="partnerExample"></div>
</main>

<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('entrate')">
    <span class="material-symbols-outlined nav-icon">payments</span>
    <span class="nav-label">Entrate</span>
  </button>
  <button class="nav-item nav-item--center" onclick="goTo('home')">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" onclick="goTo('pockets')">
    <span class="material-symbols-outlined nav-icon">grid_view</span>
    <span class="nav-label">Pocket</span>
  </button>
</nav>

<script src="../assets/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  }
</script>
</body>
</html>
