<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="theme-color" content="#0D0D14" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon-192.png" />
  <title>Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body data-page="entrate">

<header class="app-header">
  <button class="icon-btn" onclick="openHamburger()">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <span class="app-name">Finance</span>
  <div class="header-avatar" id="headerAvatar" onclick="goTo('profile')">B</div>
</header>

<main class="main-content">
  <section class="entrate-hero">
    <div class="hero-blob hero-blob--tr"></div>
    <div class="hero-blob hero-blob--bl"></div>
    <p class="entrate-hero-label">Entrate mensili totali</p>
    <div class="entrate-hero-amount">
      <span class="entrate-hero-value" id="entrateTotalNum">0</span>
      <span class="entrate-hero-currency">€</span>
    </div>
  </section>

  <div class="section-header">
    <div>
      <h2 class="section-heading">Sorgenti di entrata</h2>
      <p class="section-sub" id="entrateCount"></p>
    </div>
  </div>
  <div class="pocket-list" id="entrateList"></div>
</main>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="goTo('entrate')">
    <span class="material-symbols-outlined nav-icon">payments</span>
    <span class="nav-label">Entrate</span>
  </button>
  <button class="nav-item nav-item--center" onclick="goTo('home')">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" onclick="goTo('pockets')">
    <span class="material-symbols-outlined nav-icon">grid_view</span>
    <span class="nav-label">Pocket</span>
  </button>
</nav>

<button class="fab" onclick="openEntrataModal()">
  <span class="material-symbols-outlined">add</span>
</button>

<!-- ENTRATA MODAL -->
<div class="modal-overlay" id="entrataModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="entrataModalTitle">Nuova entrata</span>
      <button class="modal-close-x" onclick="closeEntrataModal()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="pocket-preview">
      <div class="pocket-preview-icon" id="entrataPreviewIcon">💼</div>
      <div>
        <p class="pocket-preview-name" id="entrataPreviewName">Entrata</p>
        <p class="pocket-preview-amount" id="entrataPreviewAmount">€0 / mese</p>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" class="form-input emoji-input" id="entrataEmoji" placeholder="💼" maxlength="2" oninput="updateEntrataPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Causale</label>
      <input type="text" class="form-input" id="entrataName" placeholder="es. Stipendio" oninput="updateEntrataPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Importo mensile (€)</label>
      <input type="number" class="form-input" id="entrataAmount" placeholder="1800" min="0" step="1" inputmode="numeric" oninput="updateEntrataPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Colore</label>
      <div class="color-swatches" id="entrataColorSwatches"></div>
    </div>
    <button class="submit-btn" onclick="saveEntrata()">Salva entrata</button>
    <button class="delete-btn" id="entrataDeleteBtn" onclick="deleteEntrataFromModal()" style="display:none">Elimina entrata</button>
  </div>
</div>

<!-- HAMBURGER MENU -->
<div class="modal-overlay" id="hamburgerMenu">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Menu</span>
      <button class="modal-close-x" onclick="closeHamburger()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="hamburger-items">
      <button class="hamburger-item" onclick="hamburgerGo('profile')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">person</span>
        </div>
        <span class="hamburger-item-label">Profilo</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('dashboard')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">bar_chart</span>
        </div>
        <span class="hamburger-item-label">Dashboard</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('partner')">
        <div class="hamburger-item-icon" style="background:rgba(236,72,153,0.13);color:#EC4899">
          <span class="material-symbols-outlined">group</span>
        </div>
        <span class="hamburger-item-label">Partner</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('settings')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">settings</span>
        </div>
        <span class="hamburger-item-label">Impostazioni</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  }
</script>
</body>
</html>
