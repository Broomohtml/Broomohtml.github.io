<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="theme-color" content="#0B0B15" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="home">

<!-- SPLASH SCREEN -->
<div id="splashScreen">
  <div class="splash-icon-wrap" id="splashIcon">
    <span class="material-symbols-outlined">account_balance_wallet</span>
  </div>
  <span class="splash-name">Finance</span>
  <span class="splash-hint">Scorri verso il basso per aprire</span>
  <span class="splash-version">v4.3.0</span>
</div>

<!-- Gradient background -->
<div class="home-bg" aria-hidden="true"></div>

<!-- HEADER -->
<header class="app-header">
  <div class="header-avatar" id="headerAvatar" onclick="goTo('profile')">B</div>
  <div class="header-search">
    <span class="material-symbols-outlined">search</span>
    <input type="text" placeholder="Cerca pocket, entrate…" readonly />
  </div>
  <div class="header-actions">
    <button class="header-icon-btn" onclick="goTo('dashboard')" aria-label="Dashboard">
      <span class="material-symbols-outlined">bar_chart</span>
    </button>
    <button class="header-icon-btn" onclick="goTo('partner')" aria-label="Partner">
      <span class="material-symbols-outlined">group</span>
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main-content">

  <!-- Amounts hero -->
  <section class="home-hero">
    <div class="home-amounts-row">
      <div class="home-amount-block">
        <span class="home-amount-label">Allocato</span>
        <span class="home-amount-value" id="summaryAllocato">€0</span>
      </div>
      <div class="home-amount-sep"></div>
      <div class="home-amount-block home-amount-block--right">
        <span class="home-amount-label">Libero</span>
        <span class="home-amount-value" id="summaryLibero">€0</span>
      </div>
    </div>
    <!-- hidden JS compat elements -->
    <div id="summaryBarFill" style="display:none"></div>
    <span id="summaryBarLabel" style="display:none"></span>
  </section>

  <!-- Pocket list sheet -->
  <div class="home-list-sheet">
    <div class="home-list-header">
      <span class="home-list-title">I tuoi pocket</span>
      <button class="home-list-action" onclick="goTo('pockets')">Gestisci →</button>
    </div>
    <div id="homePocketsList"></div>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('entrate')">
    <span class="material-symbols-outlined nav-icon">payments</span>
    <span class="nav-label">Entrate</span>
  </button>
  <button class="nav-item active" onclick="goTo('home')">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" onclick="goTo('pockets')">
    <span class="material-symbols-outlined nav-icon">grid_view</span>
    <span class="nav-label">Pocket</span>
  </button>
</nav>

<!-- POCKET MODAL -->
<div class="modal-overlay" id="pocketModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="pocketModalTitle">Nuovo pocket</span>
      <button class="modal-close-x" onclick="closePocketModal()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="pocket-preview">
      <div class="pocket-preview-icon" id="pocketPreviewIcon">💳</div>
      <div>
        <p class="pocket-preview-name" id="pocketPreviewName">Pocket</p>
        <p class="pocket-preview-amount" id="pocketPreviewAmount">€0 / mese</p>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" class="form-input emoji-input" id="pocketEmoji" placeholder="💳" maxlength="2" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" class="form-input" id="pocketName" placeholder="es. Affitto" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Importo mensile (€)</label>
      <input type="number" class="form-input" id="pocketAmount" placeholder="400" min="0" step="1" inputmode="numeric" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Colore</label>
      <div class="color-swatches" id="pocketColorSwatches"></div>
    </div>
    <button class="submit-btn" onclick="savePocket()">Salva pocket</button>
    <button class="delete-btn" id="pocketDeleteBtn" onclick="deletePocketFromModal()" style="display:none">Elimina pocket</button>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  // screen.height = altezza fisica schermo CSS px, sempre corretta, no async
  document.documentElement.style.setProperty('--screen-height', window.screen.height + 'px');

  // --app-height per il body (ancora utile per il layout generale)
  function setAppHeight() {
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      setAppHeight();
      setTimeout(setAppHeight, 300);
    });
  } else {
    window.addEventListener('resize', setAppHeight);
  }

  // SPLASH DISABILITATO — test
  const splash = document.getElementById('splashScreen');
  splash.style.display = 'none';

  // Pocket di test se non ce ne sono
  if (!localStorage.getItem('fx_pockets')) {
    localStorage.setItem('fx_pockets', JSON.stringify([
      {id:'t1', name:'Affitto', emoji:'🏠', amount:700, color:'#7B2FFF', active:true},
      {id:'t2', name:'Spesa', emoji:'🛒', amount:350, color:'#00D87C', active:true},
      {id:'t3', name:'Trasporti', emoji:'🚗', amount:150, color:'#FF6B6B', active:true},
      {id:'t4', name:'Ristoranti', emoji:'🍕', amount:200, color:'#FFA500', active:true},
    ]));
  }

</script>
</body>
</html>
