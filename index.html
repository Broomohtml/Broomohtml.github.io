<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <meta name="theme-color" content="#0D0D14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="home">

<header class="app-header">
  <button class="icon-btn" onclick="openHamburger()">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <span class="app-name">Finance</span>
  <div class="header-avatar" id="headerAvatar" onclick="goTo('profile')">B</div>
</header>

<main class="main-content">
  <section class="summary-card" onclick="goTo('dashboard')">
    <div class="summary-card-top">
      <span class="summary-card-label-sm">Dashboard ↗</span>
      <span class="material-symbols-outlined summary-card-more">more_horiz</span>
    </div>
    <div class="summary-row">
      <div class="summary-mini">
        <p class="summary-mini-label">Allocato</p>
        <p class="summary-mini-amount" id="summaryAllocato">€0</p>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-mini summary-mini--right">
        <p class="summary-mini-label">Libero</p>
        <p class="summary-mini-amount" id="summaryLibero">€0</p>
      </div>
    </div>
    <div class="summary-bar-bg">
      <div class="summary-bar-fill" id="summaryBarFill" style="width:0%"></div>
    </div>
    <div class="summary-bar-footer">
      <span class="summary-bar-label" id="summaryBarLabel">0% del reddito allocato</span>
    </div>
  </section>

  <div class="section-header section-header--home">
    <h2 class="section-heading">I tuoi pocket</h2>
    <a class="section-link" onclick="goTo('pockets')">
      Gestisci <span class="material-symbols-outlined section-link-icon">arrow_forward</span>
    </a>
  </div>
  <div class="pocket-list" id="homePocketsList"></div>
</main>

<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('entrate')">
    <span class="material-symbols-outlined nav-icon">payments</span>
    <span class="nav-label">Entrate</span>
  </button>
  <button class="nav-item active nav-item--center">
    <span class="material-symbols-outlined nav-icon">home</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-item" onclick="goTo('pockets')">
    <span class="material-symbols-outlined nav-icon">grid_view</span>
    <span class="nav-label">Pocket</span>
  </button>
</nav>

<!-- POCKET MODAL -->
<div class="modal-overlay" id="pocketModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="pocketModalTitle">Nuovo pocket</span>
      <button class="modal-close-x" onclick="closePocketModal()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="pocket-preview">
      <div class="pocket-preview-icon" id="pocketPreviewIcon">💳</div>
      <div>
        <p class="pocket-preview-name" id="pocketPreviewName">Pocket</p>
        <p class="pocket-preview-amount" id="pocketPreviewAmount">€0 / mese</p>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" class="form-input emoji-input" id="pocketEmoji" placeholder="💳" maxlength="2" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" class="form-input" id="pocketName" placeholder="es. Affitto" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Importo mensile (€)</label>
      <input type="number" class="form-input" id="pocketAmount" placeholder="400" min="0" step="1" inputmode="numeric" oninput="updatePocketPreview()" />
    </div>
    <div class="form-group">
      <label class="form-label">Colore</label>
      <div class="color-swatches" id="pocketColorSwatches"></div>
    </div>
    <button class="submit-btn" onclick="savePocket()">Salva pocket</button>
    <button class="delete-btn" id="pocketDeleteBtn" onclick="deletePocketFromModal()" style="display:none">Elimina pocket</button>
  </div>
</div>

<!-- HAMBURGER MENU -->
<div class="modal-overlay" id="hamburgerMenu">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Menu</span>
      <button class="modal-close-x" onclick="closeHamburger()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="hamburger-items">
      <button class="hamburger-item" onclick="hamburgerGo('profile')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">person</span>
        </div>
        <span class="hamburger-item-label">Profilo</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('dashboard')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">bar_chart</span>
        </div>
        <span class="hamburger-item-label">Dashboard</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('partner')">
        <div class="hamburger-item-icon" style="background:rgba(236,72,153,0.13);color:#EC4899">
          <span class="material-symbols-outlined">group</span>
        </div>
        <span class="hamburger-item-label">Partner</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
      <button class="hamburger-item" onclick="hamburgerGo('settings')">
        <div class="hamburger-item-icon" style="background:rgba(124,58,237,0.13);color:#A78BFA">
          <span class="material-symbols-outlined">settings</span>
        </div>
        <span class="hamburger-item-label">Impostazioni</span>
        <span class="material-symbols-outlined hamburger-chevron">chevron_right</span>
      </button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
